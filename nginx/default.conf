server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; worker-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
  add_header X-Content-Type-Options "nosniff" always;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/pdf image/svg+xml;
  gzip_min_length 256;

  brotli on;
  brotli_static on;
  brotli_comp_level 5;
  brotli_types text/plain text/css application/javascript application/json image/svg+xml;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
